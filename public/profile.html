<!DOCTYPE html>
<html lang="tr" class="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joobs — Uzman Profili</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-gray-50 dark:bg-[#08080e] text-gray-900 dark:text-gray-100 min-h-screen">

  <!-- NAVBAR -->
  <header class="glass sticky top-0 z-50 border-b border-gray-200/80 dark:border-gray-800/80">
    <div class="max-w-5xl mx-auto px-4 h-14 flex items-center gap-3">
      <a href="index.html" class="flex items-center gap-2.5">
        <div
          class="w-7 h-7 bg-gradient-to-br from-violet-600 to-purple-700 rounded-lg flex items-center justify-center shadow-md shadow-violet-900/20">
          <span class="text-white text-xs font-black">J</span>
        </div>
        <span class="font-bold text-sm brand-text">Joobs</span>
      </a>
      <div class="flex-1"></div>
      <button onclick="Theme.toggle()"
        class="w-8 h-8 flex items-center justify-center rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800/60 transition-colors">
        <svg id="icon-sun" class="w-4 h-4 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2">
          <circle cx="12" cy="12" r="5" />
          <path
            d="M12 2v2m0 16v2M4.22 4.22l1.42 1.42m12.72 12.72 1.42 1.42M2 12h2m16 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
        </svg>
        <svg id="icon-moon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>
      <!-- Auth alanı -->
      <div id="auth-area" class="flex items-center gap-2"></div>

      <a href="index.html"
        class="text-xs font-medium text-gray-500 dark:text-gray-400 hover:text-violet-500 transition-colors">← Ana
        Sayfa</a>
    </div>
  </header>

  <!-- LOADING -->
  <div id="loading" class="flex flex-col items-center justify-center h-[60vh] gap-3">
    <div class="w-8 h-8 border-2 border-violet-500 border-t-transparent rounded-full spin"></div>
    <span class="text-sm text-gray-400">Profil yükleniyor…</span>
  </div>

  <!-- NOT FOUND -->
  <div id="notfound" style="display:none" class="flex flex-col items-center justify-center h-[60vh] gap-3 text-center">
    <div class="text-4xl">🤷</div>
    <h2 class="text-lg font-bold">Uzman bulunamadı</h2>
    <a href="index.html" class="px-4 py-2 bg-violet-600 text-white text-sm rounded-lg">Ana Sayfaya Dön</a>
  </div>

  <!-- PROFILE -->
  <div id="profile" style="display:none">
    <!-- Hero -->
    <section>
      <div id="cover" class="h-44"></div>
      <div class="max-w-5xl mx-auto px-4 flex items-end gap-5 -mt-12">
        <div id="avatar"
          class="w-28 h-28 rounded-full border-4 border-gray-50 dark:border-[#08080e] flex items-center justify-center text-white text-4xl font-bold flex-shrink-0">
          ?</div>
        <div class="pb-2 min-w-0">
          <h1 id="p-name" class="text-2xl sm:text-3xl font-black tracking-tight">-</h1>
          <p id="p-title" class="text-sm text-gray-500 dark:text-gray-400">-</p>
          <div class="flex items-center gap-2 mt-1">
            <span id="p-rating" class="text-amber-500 font-bold text-sm">★ 0.0</span>
            <span id="p-reviewcount" class="text-xs text-gray-400"></span>
          </div>
        </div>
      </div>
    </section>

    <main class="max-w-5xl mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- Sol kolon -->
      <aside class="space-y-6">
        <div class="bg-white dark:bg-[#111119] border border-gray-200/80 dark:border-gray-800/60 rounded-2xl p-5">
          <h2 class="text-sm font-bold mb-3 flex items-center gap-1.5">📋 Hizmet Detayları</h2>
          <div class="space-y-2 text-sm">
            <p class="flex justify-between"><span class="text-gray-500">📍 Bölge</span><strong id="i-loc">-</strong></p>
            <p class="flex justify-between"><span class="text-gray-500">🕒 Saatler</span><strong id="i-hours">-</strong>
            </p>
            <p class="flex justify-between"><span class="text-gray-500">💰 Başlangıç</span><strong id="i-price"
                class="text-violet-500">-</strong></p>
          </div>
          <div id="action-buttons-container">
            <button onclick="App.contact()"
              class="w-full mt-4 py-2.5 bg-gradient-to-r from-violet-600 to-purple-600 hover:opacity-90 text-white text-sm font-semibold rounded-xl transition-opacity">İletişime
              Geç</button>
          </div>
        </div>

        <div class="bg-white dark:bg-[#111119] border border-gray-200/80 dark:border-gray-800/60 rounded-2xl p-5">
          <h2 class="text-sm font-bold mb-3 flex items-center gap-1.5">⚡ Beceriler</h2>
          <div id="skills" class="flex flex-wrap gap-2"></div>
        </div>
      </aside>

      <!-- Sağ kolon -->
      <section class="lg:col-span-2 space-y-6">
        <div class="bg-white dark:bg-[#111119] border border-gray-200/80 dark:border-gray-800/60 rounded-2xl p-5">
          <h2 class="text-sm font-bold mb-4 flex items-center gap-1.5">💼 Portfolyo</h2>
          <div id="portfolio" class="grid grid-cols-1 sm:grid-cols-2 gap-3"></div>
        </div>

        <div class="bg-white dark:bg-[#111119] border border-gray-200/80 dark:border-gray-800/60 rounded-2xl p-5">
          <h2 class="text-sm font-bold mb-4 flex items-center gap-1.5">💬 Müşteri Yorumları <span id="rev-count"
              class="text-xs text-gray-400 font-normal"></span></h2>
          <div id="reviews" class="space-y-1 mb-5"></div>

          <form onsubmit="App.submitReview(event)" class="bg-gray-50 dark:bg-gray-900/40 rounded-xl p-4 space-y-3">
            <h3 class="text-xs font-bold text-gray-600 dark:text-gray-300">Değerlendirme Bırak</h3>
            <input id="rev-user" type="text" placeholder="Adınız Soyadınız" required
              class="w-full px-3 py-2.5 text-sm rounded-xl bg-white dark:bg-[#12121c] border border-gray-200 dark:border-gray-800 outline-none focus:ring-2 focus:ring-violet-500/40">
            <select id="rev-rate"
              class="w-full px-3 py-2.5 text-sm rounded-xl bg-white dark:bg-[#12121c] border border-gray-200 dark:border-gray-800 outline-none focus:ring-2 focus:ring-violet-500/40">
              <option value="5">★★★★★ 5 — Mükemmel</option>
              <option value="4">★★★★ 4 — Çok İyi</option>
              <option value="3">★★★ 3 — Orta</option>
              <option value="2">★★ 2 — Zayıf</option>
              <option value="1">★ 1 — Kötü</option>
            </select>
            <textarea id="rev-text" rows="3" placeholder="Hizmet kalitesi hakkında yorumunuz…" required
              class="w-full px-3 py-2.5 text-sm rounded-xl bg-white dark:bg-[#12121c] border border-gray-200 dark:border-gray-800 outline-none focus:ring-2 focus:ring-violet-500/40 resize-none"></textarea>
            <button type="submit"
              class="w-full py-2.5 bg-violet-600 hover:bg-violet-700 text-white text-sm font-semibold rounded-xl transition-colors">Yorumu
              Yayınla</button>
          </form>
        </div>
      </section>
    </main>
  </div>

  <!-- ═══════════════════════════ MODALLAR ═════════════════════════════════ -->
  <div id="editModal" class="modal-backdrop fixed inset-0 z-[1000] hidden items-center justify-center p-4">
    <div
      class="modal-pop bg-white dark:bg-[#12121c] w-full max-w-lg rounded-2xl border border-gray-200 dark:border-gray-800 shadow-2xl p-6 relative max-h-[90vh] overflow-y-auto">
      <button onclick="App.closeModal('editModal')"
        class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 dark:hover:text-gray-200 text-xl">&times;</button>
      <h3 class="text-lg font-bold mb-1">İlanı Düzenle</h3>
      <p class="text-xs text-gray-500 dark:text-gray-400 mb-5">İlan bilgilerinizi güncelleyin.</p>
      <form id="editForm" onsubmit="App.submitEdit(event)" class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-left">
        <div>
          <label class="lbl">Ad Soyad</label>
          <input id="e-name" type="text" required class="inp">
        </div>
        <div>
          <label class="lbl">Kategori</label>
          <select id="e-category" class="inp">
            <option value="yazilim">💻 Yazılım & BT</option>
            <option value="tasarim">🎨 Tasarım & Grafik</option>
            <option value="temizlik">🧹 Ev Temizliği</option>
            <option value="tamirat">🔧 Tamirat & Tadilat</option>
          </select>
        </div>
        <div class="sm:col-span-2">
          <label class="lbl">Profesyonel Unvan</label>
          <input id="e-title" type="text" required class="inp" placeholder="Örn: Full-Stack Web Geliştirici">
        </div>
        <div>
          <label class="lbl">Başlangıç Fiyatı (TL)</label>
          <input id="e-price" type="number" min="0" required class="inp">
        </div>
        <div>
          <label class="lbl">Şehir</label>
          <input id="e-location" type="text" required class="inp">
        </div>
        <div>
          <label class="lbl">Çalışma Saatleri</label>
          <input id="e-hours" type="text" required class="inp">
        </div>
        <div>
          <label class="lbl">Telefon</label>
          <input id="e-phone" type="text" required class="inp">
        </div>
        <div>
          <label class="lbl">E-posta</label>
          <input id="e-email" type="email" required class="inp">
        </div>
        <div>
          <label class="lbl">Tema Rengi</label>
          <select id="e-color" class="inp">
            <option value="#7c3aed">Mor (Joobs)</option>
            <option value="#4f46e5">İndigo Mavi</option>
            <option value="#10b981">Zümrüt Yeşil</option>
            <option value="#ec4899">Pembe</option>
            <option value="#f59e0b">Kehribar</option>
            <option value="#06b6d4">Camgöbeği</option>
          </select>
        </div>
        <div class="sm:col-span-2">
          <label class="lbl">Beceriler (virgülle ayırın)</label>
          <input id="e-skills" type="text" class="inp" placeholder="HTML, CSS, React">
        </div>
        <div class="sm:col-span-2">
          <label class="lbl">Örnek İşler (virgülle ayırın)</label>
          <input id="e-portfolio" type="text" class="inp" placeholder="X Şirket Logosu, E-Ticaret Sitesi">
        </div>
        <button type="submit"
          class="sm:col-span-2 mt-2 py-2.5 bg-gradient-to-r from-violet-600 to-purple-600 hover:opacity-90 text-white text-sm font-bold rounded-xl transition-opacity">Değişiklikleri
          Kaydet</button>
      </form>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const App = {
      id: new URLSearchParams(location.search).get('id'),
      data: null,

      async init() {
        Theme.init();
        this.renderAuth();
        if (!this.id) return this.fail();
        try {
          this.data = await API.provider(this.id);
          this.render();
        } catch (e) { this.fail(); }
      },

      renderAuth() {
        const area = document.getElementById('auth-area');
        if (Auth.isLoggedIn()) {
          const u = Auth.user() || {};
          area.innerHTML = `
            <span class="hidden sm:block text-xs text-gray-500 dark:text-gray-400">Merhaba, <strong class="text-gray-700 dark:text-gray-200">${esc(u.name || '')}</strong></span>
            <a href="my-listings.html" class="px-3 py-2 text-xs font-semibold rounded-lg text-violet-500 hover:bg-violet-50 dark:hover:bg-violet-950/20 transition-colors">İlanlarım</a>
            <button onclick="Auth.logout()" class="px-3 py-2 text-xs font-semibold rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800/60 transition-colors">Çıkış</button>`;
        } else {
          area.innerHTML = `<a href="index.html?loginRequired=true" class="px-3 py-2 text-xs font-semibold rounded-lg text-gray-600 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-gray-800/60 transition-colors">Giriş Yap</a>`;
        }
      },

      fail() {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('notfound').style.display = 'flex';
      },

      render() {
        const { provider: p, reviews } = this.data;
        document.getElementById('loading').style.display = 'none';
        document.getElementById('profile').style.display = 'block';
        document.title = `${p.name} — Joobs`;

        document.getElementById('cover').style.cssText = `height:11rem; ${bannerStyle(p.color)}`;
        const av = document.getElementById('avatar');
        av.style.backgroundColor = p.color; av.textContent = p.initial;
        document.getElementById('p-name').textContent = p.name;
        document.getElementById('p-title').textContent = p.title;
        document.getElementById('p-rating').textContent = '★ ' + p.ratingNum.toFixed(1);
        document.getElementById('p-reviewcount').textContent = `(${p.reviewCount} yorum)`;
        document.getElementById('i-loc').textContent = p.location || '—';
        document.getElementById('i-hours').textContent = p.hours || '—';
        document.getElementById('i-price').textContent = p.price;

        document.getElementById('skills').innerHTML = (p.skills || []).length
          ? p.skills.map(s => `<span class="skill-chip px-3 py-1 rounded-full text-xs font-semibold bg-violet-100 dark:bg-violet-900/30 text-violet-700 dark:text-violet-300">${esc(s)}</span>`).join('')
          : '<span class="text-xs text-gray-400">Beceri eklenmemiş</span>';

        document.getElementById('portfolio').innerHTML = (p.portfolio || []).length
          ? p.portfolio.map(w => `<div class="bg-gray-50 dark:bg-gray-900/40 border border-gray-200 dark:border-gray-800 rounded-xl px-4 py-4 text-sm font-medium text-center">💼 ${esc(w)}</div>`).join('')
          : '<p class="text-xs text-gray-400 col-span-2">Henüz iş eklenmemiş.</p>';

        // Sahiplik Kontrolü & Butonlar
        const currentUser = Auth.user();
        const isOwner = currentUser && p.owner && String(p.owner) === String(currentUser.id);
        const btnContainer = document.getElementById('action-buttons-container');

        if (isOwner) {
          btnContainer.innerHTML = `
        <div class="grid grid-cols-2 gap-2 mt-4">
          <button onclick="App.openEditModal()" class="py-2.5 bg-gradient-to-r from-violet-600 to-purple-600 hover:opacity-90 text-white text-xs font-semibold rounded-xl transition-opacity">İlanı Düzenle</button>
          <button onclick="App.deleteListing()" class="py-2.5 bg-gradient-to-r from-red-600 to-rose-600 hover:opacity-90 text-white text-xs font-semibold rounded-xl transition-opacity">İlanı Sil</button>
        </div>`;
        } else {
          btnContainer.innerHTML = `
        <button onclick="App.contact()" class="w-full mt-4 py-2.5 bg-gradient-to-r from-violet-600 to-purple-600 hover:opacity-90 text-white text-sm font-semibold rounded-xl transition-opacity">İletişime Geç</button>`;
        }

        this.renderReviews(reviews);
      },

      renderReviews(reviews) {
        document.getElementById('rev-count').textContent = `(${reviews.length})`;
        const box = document.getElementById('reviews');
        if (!reviews.length) { box.innerHTML = '<p class="text-xs text-gray-400 py-3">İlk yorumu siz yapın!</p>'; return; }
        box.innerHTML = reviews.map(r => `
      <div class="py-3 border-b border-gray-100 dark:border-gray-800/60 last:border-0">
        <div class="flex items-center justify-between">
          <span class="text-sm font-semibold">👤 ${esc(r.user)}</span>
          <span class="text-amber-500 text-sm">${'★'.repeat(r.rate)}<span class="text-gray-300 dark:text-gray-700">${'★'.repeat(5 - r.rate)}</span></span>
        </div>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">"${esc(r.text)}"</p>
      </div>`).join('');
      },

      async submitReview(e) {
        e.preventDefault();
        const body = {
          user: document.getElementById('rev-user').value,
          rate: Number(document.getElementById('rev-rate').value),
          text: document.getElementById('rev-text').value,
        };
        try {
          await API.addReview(this.id, body);
          this.data = await API.provider(this.id);
          this.render();
          document.getElementById('rev-user').value = '';
          document.getElementById('rev-text').value = '';
          toast('Yorumunuz yayınlandı!');
        } catch (err) { toast(err.message, 'err'); }
      },

      contact() {
        const p = this.data.provider;
        toast(`${p.phone || p.email || p.name} ile iletişime geçebilirsiniz`, 'info');
      },

      openEditModal() {
        const p = this.data.provider;
        document.getElementById('e-name').value = p.name || '';
        document.getElementById('e-title').value = p.title || '';
        document.getElementById('e-category').value = p.category || 'yazilim';
        document.getElementById('e-price').value = p.priceNum || 0;
        document.getElementById('e-location').value = p.location || '';
        document.getElementById('e-hours').value = p.hours || '09:00 - 18:00';
        document.getElementById('e-phone').value = p.phone || '';
        document.getElementById('e-email').value = p.email || '';
        document.getElementById('e-color').value = p.color || '#7c3aed';
        document.getElementById('e-skills').value = (p.skills || []).join(', ');
        document.getElementById('e-portfolio').value = (p.portfolio || []).join(', ');
        this.openModal('editModal');
      },

      async submitEdit(e) {
        e.preventDefault();
        const body = {
          name: document.getElementById('e-name').value,
          title: document.getElementById('e-title').value,
          category: document.getElementById('e-category').value,
          priceNum: Number(document.getElementById('e-price').value),
          location: document.getElementById('e-location').value,
          hours: document.getElementById('e-hours').value,
          phone: document.getElementById('e-phone').value,
          email: document.getElementById('e-email').value,
          color: document.getElementById('e-color').value,
          skills: document.getElementById('e-skills').value,
          portfolio: document.getElementById('e-portfolio').value,
        };
        try {
          await API.updateProvider(this.id, body);
          this.closeModal('editModal');
          toast('İlan başarıyla güncellendi!');
          this.data = await API.provider(this.id);
          this.render();
        } catch (err) { toast(err.message, 'err'); }
      },

      async deleteListing() {
        if (!confirm('Bu ilanı silmek istediğinize emin misiniz? Bu işlem geri alınamaz.')) return;
        try {
          await API.deleteProvider(this.id);
          toast('İlan başarıyla silindi!');
          setTimeout(() => location.href = 'index.html', 1000);
        } catch (err) { toast(err.message, 'err'); }
      },

      openModal(id) { const m = document.getElementById(id); m.classList.remove('hidden'); m.classList.add('flex'); },
      closeModal(id) { const m = document.getElementById(id); m.classList.add('hidden'); m.classList.remove('flex'); },
    };

    // Modal dışına tıklayınca kapat
    document.querySelectorAll('.modal-backdrop').forEach(m => {
      m.addEventListener('click', e => { if (e.target === m) { m.classList.add('hidden'); m.classList.remove('flex'); } });
    });

    App.init();
  </script>
</body>

</html>
